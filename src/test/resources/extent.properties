# ============================================================
# ExtentReports Cucumber7 Adapter Configuration
# ============================================================

# Enable/disable the adapter
extent.reporter.spark.start=true
extent.reporter.spark.out=test-output/extent-reports/ExtentReport.html

# Enable JSON reporter for Jenkins trends
extent.reporter.json.start=true
extent.reporter.json.out=test-output/extent-reports/ExtentReport.json

# Report title and name
extent.reporter.spark.vieworder=dashboard,test,category,exception,author,device,log

# Screenshots
screenshot.dir=test-output/screenshots
screenshot.rel.path=../screenshots/

# Attach screenshots on failure
basedir=test-output/extent-reports
