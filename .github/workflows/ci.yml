name: Hybrid Automation Framework - CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options: [ qa, stage, prod ]
      tags:
        description: 'Cucumber tags to run'
        required: true
        default: '@Smoke'
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options: [ chrome, firefox ]

jobs:
  test:
    name: Run Automation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Run Tests
        env:
          ENV:     ${{ github.event.inputs.environment || 'qa' }}
          BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
          TAGS:    ${{ github.event.inputs.tags || '@Smoke' }}
        run: |
          mvn test \
            -Denv=$ENV \
            -Dbrowser=$BROWSER \
            -Dheadless=true \
            "-Dcucumber.filter.tags=$TAGS" \
            --no-transfer-progress

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            test-output/extent-reports/
            test-output/cucumber-reports/
            test-output/screenshots/
            test-output/logs/
          retention-days: 7

       - name: Publish JUnit Test Results
  uses: dorny/test-reporter@v1
  if: always()          # ✅ CORRECT - step level
  with:
    name: Cucumber Test Results
    path: test-output/cucumber-reports/*.xml
    reporter: java-junit
    fail-on-error: false
